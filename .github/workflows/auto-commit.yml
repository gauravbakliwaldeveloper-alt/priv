name: Auto Commit Fast

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make changes
        run: |
          echo "Commit at $(date) $RANDOM" >> data.txt

      - name: Commit & Push
        run: |
          git config user.name "gauravbakliwaldeveloper-alt"
          git config user.email "gauravbakliwaldeveloper@gmail.com"
          git add .
          git commit -m "Auto commit $(date)" || echo "No changes"
          git push
